<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 820px;
    margin: 40px auto;
    padding: 0 20px;
    background: #e8f8f5; /* light aquamarine background */
    color: #2d4a4a;
  }

  h1 { color: #2a7a7a; margin-bottom: 20px; }

  /* Form box */
  .form-box {
    background: #f0faff; /* azure tint */
    border: 1px solid #b2dff0;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .form-box h2 { margin: 0 0 14px; font-size: 1rem; color: #1a6a8a; }

  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }

  input[type="text"], textarea, select {
    border: 1px solid #a8d5e8;
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 0.9rem;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #2d4a4a;
    outline: none;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: #4db8c8;
  }
  input[type="text"] { flex: 1; min-width: 180px; }
  textarea { width: 100%; resize: vertical; min-height: 70px; box-sizing: border-box; }

  /* Buttons */
  .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.88rem; font-weight: bold; }
  .btn-primary { background: #3bbfbf; color: #fff; }           /* aquamarine */
  .btn-primary:hover { background: #2aa0a0; }
  .btn-edit { background: #6ab4d8; color: #fff; }              /* azure */
  .btn-edit:hover { background: #4a98c4; }
  .btn-delete { background: #e8a0b0; color: #fff; }            /* rosewater */
  .btn-delete:hover { background: #d4758a; }
  .btn-cancel { background: #c8dce8; color: #2d4a4a; }
  .btn-cancel:hover { background: #a8c4d8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Search row */
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-row input { flex: 1; min-width: 180px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #b8e0e8; }
  th { background: #b2e8e0; text-align: left; padding: 10px 14px; font-size: 0.85rem; color: #1a5a5a; border-bottom: 1px solid #8ecece; }
  td { padding: 10px 14px; border-bottom: 1px solid #e0f4f4; font-size: 0.9rem; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f0fafa; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.76rem; font-weight: bold; }
  .badge-todo       { background: #dce8f8; color: #2a4a8a; }   /* soft azure */
  .badge-in_progress{ background: #fffacd; color: #7a5a00; }   /* lemon chiffon */
  .badge-done       { background: #b8f0d8; color: #1a5a3a; }   /* mint */
  .badge-low        { background: #e0f0f8; color: #2a6a8a; }
  .badge-medium     { background: #fde8c0; color: #7a4a00; }   /* peach */
  .badge-high       { background: #fcd8e0; color: #8a1a2a; }   /* rosewater */

  .actions { display: flex; gap: 6px; }

  /* Messages */
  .msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
  .msg-ok  { background: #c8f0e0; color: #1a5a3a; border: 1px solid #8adcb8; }
  .msg-err { background: #fcd8e0; color: #8a1a2a; border: 1px solid #e8a0b0; }

  .empty   { text-align: center; color: #7aadad; padding: 30px; }
  .loading { text-align: center; color: #5a9898; padding: 20px; }

  /* Section label */
  .section-label { font-size: 0.8rem; font-weight: bold; color: #4a9898; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const API = 'http://localhost:8000/api';
const EMPTY = { title: '', description: '', priority: 'medium', status: 'todo' };
const STATUS_LABELS = { todo: 'To Do', in_progress: 'In Progress', done: 'Done' };

function App() {
  const [tasks, setTasks]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const [msg, setMsg]               = useState(null);
  const [form, setForm]             = useState(EMPTY);
  const [editId, setEditId]         = useState(null);
  const [search, setSearch]         = useState('');
  const [filterStatus, setFilterStatus] = useState('');

  const flash = (text, type = 'ok') => {
    setMsg({ text, type });
    setTimeout(() => setMsg(null), 2500);
  };

  const loadTasks = async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (search) params.set('search', search);
      if (filterStatus) params.set('status', filterStatus);
      const res = await fetch(`${API}/tasks/?${params}`);
      const data = await res.json();
      setTasks(data.results || data);
    } catch {
      flash('Cannot connect to API. Is Django running on port 8000?', 'err');
    }
    setLoading(false);
  };

  useEffect(() => { loadTasks(); }, [search, filterStatus]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = async () => {
    if (!form.title.trim()) return flash('Title is required.', 'err');
    try {
      if (editId) {
        const res = await fetch(`${API}/tasks/${editId}/`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form)
        });
        const updated = await res.json();
        setTasks(t => t.map(x => x.id === editId ? updated : x));
        flash('Task updated!');
      } else {
        const res = await fetch(`${API}/tasks/`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form)
        });
        const created = await res.json();
        setTasks(t => [created, ...t]);
        flash('Task created!');
      }
      setForm(EMPTY);
      setEditId(null);
    } catch { flash('Something went wrong.', 'err'); }
  };

  const handleEdit = (task) => {
    setEditId(task.id);
    setForm({ title: task.title, description: task.description, priority: task.priority, status: task.status });
    window.scrollTo(0, 0);
  };

  const handleDelete = async (id) => {
    if (!confirm('Delete this task?')) return;
    await fetch(`${API}/tasks/${id}/`, { method: 'DELETE' });
    setTasks(t => t.filter(x => x.id !== id));
    flash('Task deleted.');
  };

  const handleCancel = () => { setForm(EMPTY); setEditId(null); };

  return (
    <div>
      <h1>📋 Task Manager</h1>

      {msg && <div className={`msg msg-${msg.type}`}>{msg.text}</div>}

      {/* Add / Edit Form */}
      <div className="form-box">
        <h2>{editId ? '✏️ Edit Task' : '➕ Add New Task'}</h2>
        <div className="form-row">
          <input type="text" placeholder="Task title *" value={form.title}
            onChange={e => set('title', e.target.value)} />
          <select value={form.priority} onChange={e => set('priority', e.target.value)}>
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
          <select value={form.status} onChange={e => set('status', e.target.value)}>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <textarea placeholder="Description (optional)" value={form.description}
          onChange={e => set('description', e.target.value)} />
        <div style={{ marginTop: 10, display: 'flex', gap: 8 }}>
          <button className="btn btn-primary" onClick={handleSubmit}>
            {editId ? 'Update Task' : 'Add Task'}
          </button>
          {editId && <button className="btn btn-cancel" onClick={handleCancel}>Cancel</button>}
        </div>
      </div>

      {/* Search & Filter */}
      <div className="search-row">
        <input type="text" placeholder="🔍 Search tasks..." value={search}
          onChange={e => setSearch(e.target.value)} />
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
          <option value="">All Statuses</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>

      <div className="section-label">Tasks ({tasks.length})</div>

      {/* Task Table */}
      {loading ? (
        <div className="loading">Loading...</div>
      ) : tasks.length === 0 ? (
        <div className="empty">No tasks found.</div>
      ) : (
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {tasks.map(task => (
              <tr key={task.id}>
                <td style={{ color: '#7aadad', width: 36 }}>{task.id}</td>
                <td>
                  <div><strong>{task.title}</strong></div>
                  {task.description && (
                    <div style={{ color: '#6a9898', fontSize: '0.82rem', marginTop: 3 }}>
                      {task.description}
                    </div>
                  )}
                </td>
                <td><span className={`badge badge-${task.priority}`}>{task.priority}</span></td>
                <td><span className={`badge badge-${task.status}`}>{STATUS_LABELS[task.status]}</span></td>
                <td>
                  <div className="actions">
                    <button className="btn btn-edit" onClick={() => handleEdit(task)}>Edit</button>
                    <button className="btn btn-delete" onClick={() => handleDelete(task.id)}>Delete</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
